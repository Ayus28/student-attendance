<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Attendance System</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .login-card { background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgb(0, 0, 0, 0.1); width: 300px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .hint { font-size: 12px; color: #666; margin-top: 15px; line-height:  1.5; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>System Login</h2>
        <select id="userRole">
            <option value="professor">Professor (Admin)</option>
            <option value="student">Student (View Only)</option>
        </select>
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="handleLogin()">Login</button>
        <div class="hint">
            <b>Professor:</b> admin123 <br>
            <b>Student:</b> student123
        </div>
    </div>

    <script>
        function handleLogin() {
            const role = document.getElementById("userRole").value;
            const pass = document.getElementById("password").value;

            if (role === "professor" && pass === "admin123") {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("role", "professor");
                window.location.href = "index.html";
            } else if (role === "student" && pass === "student123") {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("role", "student");
                window.location.href = "index,html";
            } else {
                alert("Incorrect Password! Check the hints below.");
            }
        }
    </script>
</body>
</html>
